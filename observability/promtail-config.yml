server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: tutor
    static_configs:
      - targets: [localhost]
        labels:
          job: tutor
          __path__: /var/log/app/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            approved: approved
            hint_level: hint_level
      - labels:
          level:
          event:
          approved:
